AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Agenda backend - DynamoDB tables, Lambdas, and REST API

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Architectures:
      - arm64
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        VACATIONS_TABLE: !Ref VacationsTable
        VACATION_MEMBERSHIP_TABLE: !Ref VacationMembershipTable
        AUTH_TOKENS_TABLE: !Ref AuthTokensTable

Resources:
  AgendaApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: username
          AttributeType: S
      KeySchema:
        - AttributeName: username
          KeyType: HASH

  VacationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: code
          AttributeType: S
      KeySchema:
        - AttributeName: code
          KeyType: HASH

  VacationMembershipTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: username
          AttributeType: S
        - AttributeName: code
          AttributeType: S
      KeySchema:
        - AttributeName: username
          KeyType: HASH
        - AttributeName: code
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: CodeIndex
          KeySchema:
            - AttributeName: code
              KeyType: HASH
            - AttributeName: username
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  AuthTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token
          AttributeType: S
      KeySchema:
        - AttributeName: token
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: LoginLambda.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuthTokensTable
      Events:
        Post:
          Type: Api
          Properties:
            RestApiId: !Ref AgendaApi
            Path: /user/login
            Method: POST
    Metadata:
      BuildMethod: makefile

  RegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: RegisterLambda.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuthTokensTable
      Events:
        Post:
          Type: Api
          Properties:
            RestApiId: !Ref AgendaApi
            Path: /user/register
            Method: POST
    Metadata:
      BuildMethod: makefile

  LogoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: LogoutLambda.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AuthTokensTable
      Events:
        Post:
          Type: Api
          Properties:
            RestApiId: !Ref AgendaApi
            Path: /user/logout
            Method: POST
    Metadata:
      BuildMethod: makefile

  GetVacationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: GetVacationLambda.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VacationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuthTokensTable
      Events:
        Post:
          Type: Api
          Properties:
            RestApiId: !Ref AgendaApi
            Path: /vacation/get
            Method: POST
    Metadata:
      BuildMethod: makefile

  GetVacationsForUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: GetVacationsForUserLambda.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VacationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref VacationMembershipTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuthTokensTable
      Events:
        Post:
          Type: Api
          Properties:
            RestApiId: !Ref AgendaApi
            Path: /vacation/getForUser
            Method: POST
    Metadata:
      BuildMethod: makefile

  CreateVacationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: CreateVacationLambda.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VacationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref VacationMembershipTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuthTokensTable
      Events:
        Post:
          Type: Api
          Properties:
            RestApiId: !Ref AgendaApi
            Path: /vacation/create
            Method: POST
    Metadata:
      BuildMethod: makefile

  UpdateVacationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: UpdateVacationLambda.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VacationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuthTokensTable
      Events:
        Post:
          Type: Api
          Properties:
            RestApiId: !Ref AgendaApi
            Path: /vacation/update
            Method: POST
    Metadata:
      BuildMethod: makefile

  DeleteVacationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: DeleteVacationLambda.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VacationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref VacationMembershipTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuthTokensTable
      Events:
        Post:
          Type: Api
          Properties:
            RestApiId: !Ref AgendaApi
            Path: /vacation/delete
            Method: POST
    Metadata:
      BuildMethod: makefile

  AddUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: AddUserLambda.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VacationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref VacationMembershipTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuthTokensTable
      Events:
        Post:
          Type: Api
          Properties:
            RestApiId: !Ref AgendaApi
            Path: /vacation/addUser
            Method: POST
    Metadata:
      BuildMethod: makefile

  RemoveUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: RemoveUserLambda.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VacationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref VacationMembershipTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuthTokensTable
      Events:
        Post:
          Type: Api
          Properties:
            RestApiId: !Ref AgendaApi
            Path: /vacation/removeUser
            Method: POST
    Metadata:
      BuildMethod: makefile

Outputs:
  ApiUrl:
    Description: Base URL for the Agenda REST API
    Value: !Sub "https://${AgendaApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
